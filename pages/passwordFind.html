<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Find</title>
    <link rel="stylesheet" href="../stylesheet/karan.css">
</head>

<body>
    <div class="page-wrapper">
        <div class="card">
            <div class="top-row">
                <div class="avatar">✈️</div>
                <div class="title-block">
                    <h1>Oh, The treasure is encrypted and Requires Password.</h1>
                </div>
            </div>

            <div class="password-area">
                <div class="password-label">Password:</div>
                <div id="word-display" class="password-boxes"></div>
            </div>

            <div class="info-text">Each box represents word of a country, which you need to guess.</div>
            <div class="info-text">Total Attempts: <span id="attempts">14</span></div>

            <div class="input-row">
                <label for="guess-input">Guess The Country's Letter:</label>
                <input type="text" id="guess-input" maxlength="1" placeholder="A">
                <button id="guess-btn">Guess</button>
            </div>

            <div id="message"></div>
            <button id="reset-btn">Restart Game</button>
        </div>
    </div>

    <script>
        const countries = [
            'United States', 'China', 'India', 'Japan', 'Germany', 'France', 'United Kingdom', 'Brazil', 'Italy'
        ];

        let currentWord = '';
        let guessedLetters = [];
        let attemptsLeft = 14;
        const wordDisplay = document.getElementById('word-display');
        const attemptsDisplay = document.getElementById('attempts');
        const guessInput = document.getElementById('guess-input');
        const guessBtn = document.getElementById('guess-btn');
        const message = document.getElementById('message');
        const resetBtn = document.getElementById('reset-btn');

        function initGame() {
            currentWord = countries[Math.floor(Math.random() * countries.length)].toUpperCase();
            guessedLetters = [];
            attemptsLeft = 14;
            guessBtn.disabled = false;
            message.textContent = '';
            updateDisplay();
        }

        function updateDisplay() {
            wordDisplay.innerHTML = '';
            for (let i = 0; i < currentWord.length; i++) {
                const letter = currentWord[i];
                const box = document.createElement('div');
                box.className = 'letter-box';
                if (letter === ' ') {
                    box.classList.add('space');
                } else if (guessedLetters.includes(letter)) {
                    box.textContent = letter;
                    box.classList.add('revealed');
                }
                wordDisplay.appendChild(box);
            }
            attemptsDisplay.textContent = attemptsLeft;
        }

        function guessLetter() {
            const letter = guessInput.value.toUpperCase();
            guessInput.value = '';
            if (!letter.match(/^[A-Z]$/)) {
                message.textContent = 'Please enter a valid letter.';
                return;
            }
            if (guessedLetters.includes(letter)) {
                message.textContent = 'You already guessed that letter.';
                return;
            }

            guessedLetters.push(letter);
            if (!currentWord.includes(letter)) {
                attemptsLeft -= 1;
            }

            updateDisplay();

            if (currentWord.split('').every(ch => ch === ' ' || guessedLetters.includes(ch))) {
                message.textContent = 'Congratulations! You guessed the country!';
                guessBtn.disabled = true;
                return;
            }

            if (attemptsLeft <= 0) {
                message.textContent = `Game Over! The country was ${currentWord}.`;
                guessBtn.disabled = true;
            } else {
                message.textContent = '';
            }
        }

        guessBtn.addEventListener('click', guessLetter);
        guessInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                guessLetter();
            }
        });
        resetBtn.addEventListener('click', initGame);

        initGame();
    </script>
</body>

</html>
